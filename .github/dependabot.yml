version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    rebase-strategy: auto
    commit-message:
      prefix: deps(npm)
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    rebase-strategy: auto
    commit-message:
      prefix: deps(cargo)
    groups:
      cargo-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    rebase-strategy: auto
    commit-message:
      prefix: deps(actions)
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

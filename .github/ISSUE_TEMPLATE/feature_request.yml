name: "功能建议 / Feature request"
description: "建议仍属于 Windows 本地光标管理 MVP 的改进。"
title: "[Feature] "
labels:
  - "enhancement"
body:
  - type: markdown
    attributes:
      value: |
        请先描述实际问题，再说明方案。当前不规划在线市场、账号、收藏、标签、社交或云同步。

  - type: checkboxes
    id: preflight
    attributes:
      label: "提交前检查 / Pre-flight checklist"
      options:
        - label: "我已搜索现有 Issue，未发现相同建议。 / I searched existing issues for duplicates."
          required: true
        - label: "我理解建议应保持在 Windows 本地光标管理 MVP 范围内。 / I understand the current local Windows cursor-management scope."
          required: true

  - type: textarea
    id: problem
    attributes:
      label: "要解决的问题 / Problem to solve"
      description: "说明当前流程为什么困难、容易出错或无法完成。"
      placeholder: "当我...时，目前会...，因此..."
    validations:
      required: true

  - type: textarea
    id: user-scenario
    attributes:
      label: "使用场景 / User scenario"
      description: "描述谁会使用、从哪里开始，以及希望完成什么任务。"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "建议方案 / Proposed solution"
      description: "说明期望的交互、行为和成功结果；无需先写实现代码。"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "替代方案 / Alternatives considered"
      description: "说明尝试过的现有功能、临时方法或其他设计。"

  - type: dropdown
    id: affected-area
    attributes:
      label: "可能影响的范围 / Possible impact"
      multiple: true
      options:
        - "界面与交互 / UI and interaction"
        - "导入与解析 / Import and parsing"
        - "预览 / Preview"
        - "应用与注册表 / Apply and registry"
        - "文件与本地数据 / Files and local data"
        - "设置与托盘 / Settings and tray"
        - "性能与稳定性 / Performance and reliability"
        - "安装与发布 / Installation and release"
        - "文档与测试 / Documentation and tests"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: "补充信息 / Additional context"
      description: "可添加草图、截图、兼容性要求或已知风险，但不要上传无权公开的素材。"

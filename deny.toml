[graph]
# Release binaries are Windows-only; Unix GUI backends in Cargo.lock are not shipped.
targets = ["x86_64-pc-windows-msvc"]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
include-dev = true
unused-allowed-license = "allow"
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
